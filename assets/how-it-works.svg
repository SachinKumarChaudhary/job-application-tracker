<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="hbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="hshadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <marker id="ha-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#38bdf8"/>
    </marker>
    <marker id="ha-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#f87171"/>
    </marker>
    <marker id="ha-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#4ade80"/>
    </marker>
    <marker id="ha-orange" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#fb923c"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="300" fill="url(#hbg)" rx="12"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" fill="#f1f5f9" font-size="16" font-weight="bold">How It Works</text>

  <!-- Row 1: User Sign-in → OAuth → Gmail Polling -->
  <rect x="40" y="50" width="140" height="40" rx="8" fill="#1e293b" stroke="#38bdf8" stroke-width="1.5" filter="url(#hshadow)"/>
  <text x="110" y="74" text-anchor="middle" fill="#38bdf8" font-size="12" font-weight="bold">👤 User Sign-in</text>

  <line x1="180" y1="70" x2="210" y2="70" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#ha-arrow)"/>

  <rect x="212" y="50" width="100" height="40" rx="8" fill="#1e293b" stroke="#38bdf8" stroke-width="1.5" filter="url(#hshadow)"/>
  <text x="262" y="74" text-anchor="middle" fill="#38bdf8" font-size="12" font-weight="bold">🔑 OAuth</text>

  <line x1="312" y1="70" x2="342" y2="70" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#ha-arrow)"/>

  <rect x="344" y="50" width="130" height="40" rx="8" fill="#1e293b" stroke="#fb923c" stroke-width="1.5" filter="url(#hshadow)"/>
  <text x="409" y="74" text-anchor="middle" fill="#fb923c" font-size="12" font-weight="bold">📬 Gmail Polling</text>

  <line x1="474" y1="70" x2="504" y2="70" stroke="#fb923c" stroke-width="1.5" marker-end="url(#ha-orange)"/>

  <rect x="506" y="50" width="140" height="40" rx="8" fill="#1e293b" stroke="#fb923c" stroke-width="1.5" filter="url(#hshadow)"/>
  <text x="576" y="74" text-anchor="middle" fill="#fb923c" font-size="12" font-weight="bold">🤖 AI Parse</text>

  <!-- Arrow down from AI Parse -->
  <line x1="576" y1="90" x2="576" y2="120" stroke="#fb923c" stroke-width="1.5" marker-end="url(#ha-orange)"/>

  <!-- Row 2: Parser splits into three -->
  <rect x="350" y="122" width="160" height="40" rx="8" fill="#1e293b" stroke="#fb923c" stroke-width="2" filter="url(#hshadow)"/>
  <text x="430" y="147" text-anchor="middle" fill="#fb923c" font-size="12" font-weight="bold">🔍 Parser + Dedup</text>

  <!-- Arrow left to Sheets -->
  <line x1="400" y1="162" x2="250" y2="200" stroke="#4ade80" stroke-width="1.5" marker-end="url(#ha-green)"/>
  <!-- Arrow center to Sheets -->
  <line x1="430" y1="162" x2="430" y2="200" stroke="#4ade80" stroke-width="1.5" marker-end="url(#ha-green)"/>
  <!-- Arrow right to Notifier -->
  <line x1="460" y1="162" x2="610" y2="200" stroke="#fb923c" stroke-width="1.5" marker-end="url(#ha-orange)"/>

  <!-- Row 3: Three outputs -->
  <rect x="140" y="202" width="160" height="40" rx="8" fill="#1e293b" stroke="#4ade80" stroke-width="1.5" filter="url(#hshadow)"/>
  <text x="220" y="227" text-anchor="middle" fill="#4ade80" font-size="12" font-weight="bold">📊 Google Sheets</text>

  <rect x="350" y="202" width="160" height="40" rx="8" fill="#1e293b" stroke="#4ade80" stroke-width="1.5" filter="url(#hshadow)"/>
  <text x="430" y="227" text-anchor="middle" fill="#4ade80" font-size="12" font-weight="bold">📝 Auto-Create Sheet</text>

  <rect x="560" y="202" width="160" height="40" rx="8" fill="#1e293b" stroke="#fb923c" stroke-width="1.5" filter="url(#hshadow)"/>
  <text x="640" y="227" text-anchor="middle" fill="#fb923c" font-size="12" font-weight="bold">📲 Send Alert</text>

  <!-- Arrow down from alerts -->
  <line x1="640" y1="242" x2="640" y2="260" stroke="#fb923c" stroke-width="1.5" marker-end="url(#ha-orange)"/>

  <!-- Notification targets -->
  <g transform="translate(510, 262)">
    <rect rx="6" width="56" height="22" fill="#0f172a" stroke="#38bdf8" stroke-width="1"/>
    <text x="28" y="15" text-anchor="middle" fill="#38bdf8" font-size="10">Telegram</text>
  </g>
  <g transform="translate(574, 262)">
    <rect rx="6" width="46" height="22" fill="#0f172a" stroke="#a78bfa" stroke-width="1"/>
    <text x="23" y="15" text-anchor="middle" fill="#a78bfa" font-size="10">Slack</text>
  </g>
  <g transform="translate(628, 262)">
    <rect rx="6" width="76" height="22" fill="#0f172a" stroke="#fb923c" stroke-width="1"/>
    <text x="38" y="15" text-anchor="middle" fill="#fb923c" font-size="10">WhatsApp</text>
  </g>

  <!-- Footer -->
  <text x="400" y="295" text-anchor="middle" fill="#475569" font-size="10">Every 15 minutes — free, automated, zero infrastructure cost</text>
</svg>
