<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 720" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="flask" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="ai" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="sheets" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="notif" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="gmail" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f87171"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="dedup" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <filter id="label-shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#0f172a" flood-opacity="0.9"/>
    </filter>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#38bdf8"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#f87171"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#a78bfa"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#4ade80"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#fb923c"/>
    </marker>
    <marker id="arrow-teal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#2dd4bf"/>
    </marker>

    <!-- Label pills — each with a colored border matching its context -->
    <g id="pill-default">
      <rect x="-75" y="-9" width="150" height="18" rx="9" fill="#0f172a" fill-opacity="0.88" stroke="#475569" stroke-width="1"/>
    </g>
    <g id="pill-blue">
      <rect x="-75" y="-9" width="150" height="18" rx="9" fill="#0f172a" fill-opacity="0.88" stroke="#38bdf8" stroke-width="1"/>
    </g>
    <g id="pill-red">
      <rect x="-75" y="-9" width="150" height="18" rx="9" fill="#0f172a" fill-opacity="0.88" stroke="#f87171" stroke-width="1"/>
    </g>
    <g id="pill-purple">
      <rect x="-75" y="-9" width="150" height="18" rx="9" fill="#0f172a" fill-opacity="0.88" stroke="#a78bfa" stroke-width="1"/>
    </g>
    <g id="pill-green">
      <rect x="-75" y="-9" width="150" height="18" rx="9" fill="#0f172a" fill-opacity="0.88" stroke="#4ade80" stroke-width="1"/>
    </g>
    <g id="pill-orange">
      <rect x="-75" y="-9" width="150" height="18" rx="9" fill="#0f172a" fill-opacity="0.88" stroke="#fb923c" stroke-width="1"/>
    </g>
    <g id="pill-teal">
      <rect x="-75" y="-9" width="150" height="18" rx="9" fill="#0f172a" fill-opacity="0.88" stroke="#2dd4bf" stroke-width="1"/>
    </g>
  </defs>

  <!-- Background -->
  <rect width="1000" height="720" fill="url(#bg)" rx="16"/>

  <!-- Title -->
  <text x="500" y="45" text-anchor="middle" fill="#f1f5f9" font-size="24" font-weight="bold">Job Application Auto-Tracker Architecture</text>
  <text x="500" y="68" text-anchor="middle" fill="#94a3b8" font-size="13">Flask · Gemini AI · Google Sheets · Telegram/Slack/WhatsApp  |  $0 Infrastructure</text>

  <!-- ===== LAYER 1: Trigger ===== -->
  <rect x="380" y="100" width="240" height="44" rx="8" fill="#1e293b" stroke="#38bdf8" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="500" y="126" text-anchor="middle" fill="#38bdf8" font-size="13" font-weight="bold">⏱  cron-job.org (every 15 min)</text>

  <!-- Arrow: cron → Flask -->
  <line x1="500" y1="144" x2="500" y2="178" stroke="#38bdf8" stroke-width="2" marker-end="url(#arrow-blue)" stroke-dasharray="4,3"/>
  <g transform="translate(500, 162)" filter="url(#label-shadow)">
    <use href="#pill-blue"/>
    <text x="0" y="3" text-anchor="middle" fill="#38bdf8" font-size="10">GET /cron/{secret}</text>
  </g>

  <!-- ===== LAYER 2: Flask ===== -->
  <rect x="340" y="180" width="320" height="52" rx="8" fill="#0f172a" stroke="url(#flask)" stroke-width="2" filter="url(#shadow)"/>
  <text x="500" y="204" text-anchor="middle" fill="#38bdf8" font-size="14" font-weight="bold">🌐  Flask App (webui.py)</text>
  <text x="500" y="222" text-anchor="middle" fill="#94a3b8" font-size="11">OAuth · Scheduler · Per-user Token Isolation</text>

  <!-- Branch: Flask → Gmail (left) and Flask → AI (right) -->
  <line x1="440" y1="232" x2="250" y2="294" stroke="#f87171" stroke-width="2" marker-end="url(#arrow-red)"/>
  <line x1="560" y1="232" x2="750" y2="294" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrow-purple)"/>

  <g transform="translate(295, 256)" filter="url(#label-shadow)">
    <use href="#pill-red"/>
    <text x="0" y="3" text-anchor="middle" fill="#f87171" font-size="10">Gmail API · fetch unread</text>
  </g>
  <g transform="translate(695, 256)" filter="url(#label-shadow)">
    <use href="#pill-purple"/>
    <text x="0" y="3" text-anchor="middle" fill="#a78bfa" font-size="10">AI · JSON extraction</text>
  </g>

  <!-- ===== LAYER 3 Left: Gmail ===== -->
  <rect x="150" y="296" width="200" height="50" rx="8" fill="#0f172a" stroke="url(#gmail)" stroke-width="2" filter="url(#shadow)"/>
  <text x="250" y="319" text-anchor="middle" fill="#f87171" font-size="13" font-weight="bold">📥  Gmail API</text>
  <text x="250" y="336" text-anchor="middle" fill="#94a3b8" font-size="10">Fetch · Parse · Mark as read</text>

  <!-- ===== LAYER 3 Right: AI ===== -->
  <rect x="650" y="296" width="200" height="50" rx="8" fill="#0f172a" stroke="url(#ai)" stroke-width="2" filter="url(#shadow)"/>
  <text x="750" y="319" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="bold">🤖  AI Engine</text>
  <text x="750" y="336" text-anchor="middle" fill="#94a3b8" font-size="10">Gemini · Groq · NVIDIA</text>

  <!-- Arrow: Gmail → Parser (red) -->
  <line x1="250" y1="346" x2="400" y2="418" stroke="#f87171" stroke-width="2" marker-end="url(#arrow-red)"/>
  <!-- Arrow: AI → Parser (purple) -->
  <line x1="750" y1="346" x2="600" y2="418" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrow-purple)"/>

  <g transform="translate(310, 385)" filter="url(#label-shadow)">
    <use href="#pill-red"/>
    <text x="0" y="3" text-anchor="middle" fill="#f87171" font-size="10">raw email body</text>
  </g>
  <g transform="translate(675, 385)" filter="url(#label-shadow)">
    <use href="#pill-purple"/>
    <text x="0" y="3" text-anchor="middle" fill="#a78bfa" font-size="10">AI JSON → regex fallback</text>
  </g>

  <!-- ===== LAYER 4: Parser ===== -->
  <rect x="350" y="420" width="300" height="50" rx="8" fill="#0f172a" stroke="url(#notif)" stroke-width="2" filter="url(#shadow)"/>
  <text x="500" y="443" text-anchor="middle" fill="#fb923c" font-size="13" font-weight="bold">🔍  Parser (AI + Regex)</text>
  <text x="500" y="460" text-anchor="middle" fill="#94a3b8" font-size="10">Company · Role · Date · Type · Summary · Location · Salary</text>

  <!-- Branch: Parser → three destinations (color-coded) -->
  <line x1="400" y1="470" x2="250" y2="520" stroke="#2dd4bf" stroke-width="2" marker-end="url(#arrow-teal)"/>
  <line x1="500" y1="470" x2="500" y2="520" stroke="#4ade80" stroke-width="2" marker-end="url(#arrow-green)"/>
  <line x1="600" y1="470" x2="750" y2="520" stroke="#fb923c" stroke-width="2" marker-end="url(#arrow-orange)"/>

  <g transform="translate(325, 490)" filter="url(#label-shadow)">
    <use href="#pill-teal"/>
    <text x="0" y="3" text-anchor="middle" fill="#2dd4bf" font-size="10">dedup check</text>
  </g>
  <g transform="translate(500, 490)" filter="url(#label-shadow)">
    <use href="#pill-green"/>
    <text x="0" y="3" text-anchor="middle" fill="#4ade80" font-size="10">append to sheet</text>
  </g>
  <g transform="translate(675, 490)" filter="url(#label-shadow)">
    <use href="#pill-orange"/>
    <text x="0" y="3" text-anchor="middle" fill="#fb923c" font-size="10">send alert</text>
  </g>

  <!-- ===== LAYER 5: Three parallel boxes ===== -->
  <!-- Dedup — aligned with Gmail API (x=150) -->
  <rect x="150" y="525" width="200" height="50" rx="8" fill="#0f172a" stroke="url(#dedup)" stroke-width="2" filter="url(#shadow)"/>
  <text x="250" y="548" text-anchor="middle" fill="#2dd4bf" font-size="13" font-weight="bold">🛡  Dedup Check</text>
  <text x="250" y="565" text-anchor="middle" fill="#94a3b8" font-size="10">Message-ID cache</text>

  <!-- Sheets — green gradient -->
  <rect x="400" y="525" width="200" height="50" rx="8" fill="#0f172a" stroke="url(#sheets)" stroke-width="2" filter="url(#shadow)"/>
  <text x="500" y="548" text-anchor="middle" fill="#4ade80" font-size="13" font-weight="bold">📊  Google Sheets</text>
  <text x="500" y="565" text-anchor="middle" fill="#94a3b8" font-size="10">Auto-created · 13 columns</text>

  <!-- Notifier — aligned with AI Engine (x=650) -->
  <rect x="650" y="525" width="200" height="50" rx="8" fill="#0f172a" stroke="url(#notif)" stroke-width="2" filter="url(#shadow)"/>
  <text x="750" y="548" text-anchor="middle" fill="#fb923c" font-size="13" font-weight="bold">📲  Notifier</text>
  <text x="750" y="565" text-anchor="middle" fill="#94a3b8" font-size="10">Telegram · Slack · WhatsApp</text>

  <!-- Arrow: Notifier → Notification detail -->
  <line x1="750" y1="575" x2="750" y2="600" stroke="#fb923c" stroke-width="1.5" marker-end="url(#arrow-orange)"/>

  <!-- ===== LAYER 6: Notifications detail ===== -->
  <rect x="610" y="600" width="280" height="40" rx="8" fill="#1e293b" stroke="#fb923c" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="750" y="625" text-anchor="middle" fill="#fbbf24" font-size="11">Telegram DM  ·  Slack Webhook  ·  WhatsApp</text>

  <!-- Footer -->
  <text x="500" y="695" text-anchor="middle" fill="#64748b" font-size="11">Live: SachinKumarChaudhary.pythonanywhere.com  ·  GitHub: github.com/SachinKumarChaudhary/job-application-tracker</text>
</svg>
