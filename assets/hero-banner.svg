<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="hero-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" fill="url(#hero-bg)" rx="16"/>
  <rect width="800" height="200" fill="none" stroke="#334155" stroke-width="1" rx="16"/>

  <!-- Decorative circles -->
  <circle cx="720" cy="40" r="80" fill="#38bdf8" opacity="0.05"/>
  <circle cx="740" cy="60" r="60" fill="#a78bfa" opacity="0.05"/>
  <circle cx="60" cy="160" r="70" fill="#4ade80" opacity="0.05"/>

  <!-- Main title -->
  <text x="60" y="75" font-size="32" font-weight="bold" fill="#f1f5f9">📋 Offer Tracker</text>
  <text x="60" y="105" font-size="16" fill="#94a3b8">Job Application Auto-Tracker</text>

  <!-- Tagline -->
  <text x="60" y="140" font-size="13" fill="#64748b">Automatically track job applications from Gmail — AI-powered parsing, Google Sheets logging, real-time alerts.</text>

  <!-- Stats badges -->
  <g transform="translate(60, 155)">
    <rect rx="12" width="60" height="24" fill="#0f172a" stroke="#4ade80" stroke-width="1.5"/>
    <text x="30" y="16" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="bold">$0 cost</text>
  </g>
  <g transform="translate(132, 155)">
    <rect rx="12" width="54" height="24" fill="#0f172a" stroke="#38bdf8" stroke-width="1.5"/>
    <text x="27" y="16" text-anchor="middle" fill="#38bdf8" font-size="11" font-weight="bold">Live</text>
  </g>
  <g transform="translate(198, 155)">
    <rect rx="12" width="80" height="24" fill="#0f172a" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="40" y="16" text-anchor="middle" fill="#a78bfa" font-size="11" font-weight="bold">3 AI models</text>
  </g>
  <g transform="translate(290, 155)">
    <rect rx="12" width="56" height="24" fill="#0f172a" stroke="#fb923c" stroke-width="1.5"/>
    <text x="28" y="16" text-anchor="middle" fill="#fb923c" font-size="11" font-weight="bold">11 tests</text>
  </g>
</svg>
