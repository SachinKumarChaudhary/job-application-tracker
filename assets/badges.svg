<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 32">
  <defs>
    <linearGradient id="bg" x2="0" y2="100%">
      <stop offset="0" stop-color="#555" stop-opacity=".1"/>
      <stop offset="1" stop-opacity=".1"/>
    </linearGradient>
  </defs>

  <!-- MIT License -->
  <g transform="translate(0,0)">
    <rect rx="3" width="62" height="22" fill="#555"/>
    <rect rx="3" x="62" width="48" height="22" fill="#4ade80"/>
    <rect rx="3" width="110" height="22" fill="url(#bg)"/>
    <g fill="#fff" font-family="DejaVu Sans,sans-serif" font-size="11">
      <text x="31" y="15" text-anchor="middle">license</text>
      <text x="86" y="15" text-anchor="middle" fill="#010101" fill-opacity=".3">MIT</text>
      <text x="86" y="15" text-anchor="middle">MIT</text>
    </g>
  </g>

  <!-- Python 3.10+ -->
  <g transform="translate(118,0)">
    <rect rx="3" width="58" height="22" fill="#555"/>
    <rect rx="3" x="58" width="62" height="22" fill="#38bdf8"/>
    <rect rx="3" width="120" height="22" fill="url(#bg)"/>
    <g fill="#fff" font-family="DejaVu Sans,sans-serif" font-size="11">
      <text x="29" y="15" text-anchor="middle">python</text>
      <text x="89" y="15" text-anchor="middle" fill="#010101" fill-opacity=".3">3.10+</text>
      <text x="89" y="15" text-anchor="middle">3.10+</text>
    </g>
  </g>

  <!-- Tests 11 -->
  <g transform="translate(246,0)">
    <rect rx="3" width="42" height="22" fill="#555"/>
    <rect rx="3" x="42" width="68" height="22" fill="#4ade80"/>
    <rect rx="3" width="110" height="22" fill="url(#bg)"/>
    <g fill="#fff" font-family="DejaVu Sans,sans-serif" font-size="11">
      <text x="21" y="15" text-anchor="middle">tests</text>
      <text x="76" y="15" text-anchor="middle" fill="#010101" fill-opacity=".3">11 passing</text>
      <text x="76" y="15" text-anchor="middle">11 passing</text>
    </g>
  </g>

  <!-- Hosting: PythonAnywhere -->
  <g transform="translate(364,0)">
    <rect rx="3" width="72" height="22" fill="#555"/>
    <rect rx="3" x="72" width="88" height="22" fill="#a78bfa"/>
    <rect rx="3" width="160" height="22" fill="url(#bg)"/>
    <g fill="#fff" font-family="DejaVu Sans,sans-serif" font-size="11">
      <text x="36" y="15" text-anchor="middle">hosting</text>
      <text x="116" y="15" text-anchor="middle" fill="#010101" fill-opacity=".3">PythonAnywhere (free)</text>
      <text x="116" y="15" text-anchor="middle">PythonAnywhere (free)</text>
    </g>
  </g>

  <!-- AI: Gemini/Groq/NVIDIA -->
  <g transform="translate(532,0)">
    <rect rx="3" width="22" height="22" fill="#555"/>
    <rect rx="3" x="22" width="138" height="22" fill="#fb923c"/>
    <rect rx="3" width="160" height="22" fill="url(#bg)"/>
    <g fill="#fff" font-family="DejaVu Sans,sans-serif" font-size="11">
      <text x="11" y="15" text-anchor="middle">AI</text>
      <text x="91" y="15" text-anchor="middle" fill="#010101" fill-opacity=".3">Gemini | Groq | NVIDIA</text>
      <text x="91" y="15" text-anchor="middle">Gemini | Groq | NVIDIA</text>
    </g>
  </g>

  <!-- Cost: $0 -->
  <g transform="translate(700,0)">
    <rect rx="3" width="38" height="22" fill="#555"/>
    <rect rx="3" x="38" width="32" height="22" fill="#4ade80"/>
    <rect rx="3" width="70" height="22" fill="url(#bg)"/>
    <g fill="#fff" font-family="DejaVu Sans,sans-serif" font-size="11">
      <text x="19" y="15" text-anchor="middle">cost</text>
      <text x="54" y="15" text-anchor="middle" fill="#010101" fill-opacity=".3">$0</text>
      <text x="54" y="15" text-anchor="middle">$0</text>
    </g>
